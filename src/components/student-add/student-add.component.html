
<div class="max-w-4xl mx-auto bg-white dark:bg-[#1a1a14] p-10 md:p-12 rounded-4xl shadow-card border border-primary-100 dark:border-primary-900/30 transition-all duration-500 animate-fade-in">
  <div class="mb-10 pb-8 border-b border-primary-50 dark:border-primary-900/20 flex justify-between items-center">
      <div>
        <h1 class="serif text-3xl font-bold text-primary-950 dark:text-primary-50">تسجيل طالب جديد</h1>
        <p class="text-sm text-primary-600/60 dark:text-primary-400/60 mt-2 font-medium">أدخل البيانات المطلوبة لإضافة الطالب إلى قاعدة البيانات المدرسية</p>
      </div>
      <div class="w-14 h-14 bg-primary-50 dark:bg-primary-900/30 rounded-2xl flex items-center justify-center text-primary-600 dark:text-primary-400 border border-primary-100 dark:border-primary-800">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
      </div>
  </div>

  <form [formGroup]="studentForm" (ngSubmit)="onSubmit()">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-10 gap-y-8">
      
      <!-- Section Title -->
      <div class="md:col-span-2 mb-2">
        <h3 class="text-xs font-bold text-primary-400 uppercase tracking-widest flex items-center gap-3">
            <span class="w-2 h-2 rounded-full bg-primary-600"></span>
            البيانات الشخصية والأساسية
        </h3>
      </div>

      <div>
        <label for="name" class="block mb-3 text-sm font-bold text-primary-900 dark:text-primary-100">اسم الطالب الثلاثي</label>
        <div class="relative">
             <input type="text" id="name" formControlName="name" class="w-full bg-primary-50/30 dark:bg-primary-900/10 border border-primary-100 dark:border-primary-800 text-primary-950 dark:text-primary-50 text-sm rounded-2xl focus:ring-4 focus:ring-primary-600/10 focus:border-primary-600 block p-4 transition-all outline-none" placeholder="مثال: علي محمد حسين" required>
        </div>
      </div>
      
      <div>
        <label for="class" class="block mb-3 text-sm font-bold text-primary-900 dark:text-primary-100">الصف الدراسي</label>
        <div class="relative">
            <select id="class" formControlName="class" class="w-full bg-primary-50/30 dark:bg-primary-900/10 border border-primary-100 dark:border-primary-800 text-primary-950 dark:text-primary-50 text-sm rounded-2xl focus:ring-4 focus:ring-primary-600/10 focus:border-primary-600 block p-4 transition-all outline-none appearance-none cursor-pointer" required>
                <option value="" disabled selected>اختر الصف الدراسي...</option>
                @for(grade of grades; track grade) {
                    <option [value]="grade">{{ grade }}</option>
                }
            </select>
            <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center px-4 text-primary-400">
                <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" />
                </svg>
            </div>
        </div>
      </div>

      <div>
        <label for="guardianPhone" class="block mb-3 text-sm font-bold text-primary-900 dark:text-primary-100">رقم هاتف ولي الأمر</label>
        <input type="tel" id="guardianPhone" formControlName="guardianPhone" class="w-full bg-primary-50/30 dark:bg-primary-900/10 border border-primary-100 dark:border-primary-800 text-primary-950 dark:text-primary-50 text-sm rounded-2xl focus:ring-4 focus:ring-primary-600/10 focus:border-primary-600 block p-4 transition-all outline-none" placeholder="07xxxxxxxxx" required>
      </div>

      <div>
        <label for="totalFee" class="block mb-3 text-sm font-bold text-primary-900 dark:text-primary-100">القسط السنوي الكلي</label>
        <div class="relative">
            <input type="number" id="totalFee" formControlName="totalFee" class="w-full bg-primary-50/30 dark:bg-primary-900/10 border border-primary-100 dark:border-primary-800 text-primary-950 dark:text-primary-50 text-sm rounded-2xl focus:ring-4 focus:ring-primary-600/10 focus:border-primary-600 block p-4 pl-14 transition-all outline-none font-bold" required>
            <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                <span class="text-primary-400 text-xs font-bold">د.ع</span>
            </div>
        </div>
      </div>

       <!-- Section Title -->
      <div class="md:col-span-2 mt-6 mb-2">
        <h3 class="text-xs font-bold text-primary-400 uppercase tracking-widest flex items-center gap-3">
            <span class="w-2 h-2 rounded-full bg-primary-600"></span>
            معلومات إضافية وصورة الطالب
        </h3>
      </div>

       <div class="md:col-span-1">
        <label for="notes" class="block mb-3 text-sm font-bold text-primary-900 dark:text-primary-100">ملاحظات (اختياري)</label>
        <textarea id="notes" formControlName="notes" rows="6" class="w-full bg-primary-50/30 dark:bg-primary-900/10 border border-primary-100 dark:border-primary-800 text-primary-950 dark:text-primary-50 text-sm rounded-2xl focus:ring-4 focus:ring-primary-600/10 focus:border-primary-600 block p-4 transition-all outline-none resize-none" placeholder="أي ملاحظات إضافية عن الطالب..."></textarea>
      </div>

       <div class="md:col-span-1">
        <label class="block mb-3 text-sm font-bold text-primary-900 dark:text-primary-100">صورة الطالب الشخصية</label>
        <label for="dropzone-file" class="flex flex-col items-center justify-center w-full h-[178px] border-2 border-primary-100 dark:border-primary-800 border-dashed rounded-2xl cursor-pointer bg-primary-50/20 dark:bg-primary-900/10 hover:bg-primary-50 dark:hover:bg-primary-900/20 transition-all group overflow-hidden relative">
          <div class="flex flex-col items-center justify-center pt-5 pb-6 relative z-10">
            @if(studentForm.get('photoUrl')?.value) {
               <img [src]="studentForm.get('photoUrl')?.value" alt="صورة الطالب" class="w-24 h-24 object-cover rounded-2xl mb-3 border-4 border-white dark:border-primary-800 shadow-md">
               <p class="text-xs text-primary-600 dark:text-primary-400 font-bold group-hover:underline">اضغط لتغيير الصورة</p>
            } @else {
              <div class="w-14 h-14 mb-4 rounded-2xl bg-white dark:bg-primary-900/30 flex items-center justify-center text-primary-300 dark:text-primary-700 group-hover:scale-110 transition-transform border border-primary-50 dark:border-primary-800 shadow-sm">
                  <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              </div>
              <p class="mb-1 text-sm text-primary-950 dark:text-primary-50 font-bold">ارفع صورة الطالب</p>
              <p class="text-xs text-primary-400 font-medium">PNG, JPG (حد أقصى 2MB)</p>
            }
          </div>
          <input id="dropzone-file" type="file" class="hidden" (change)="onFileSelected($event)" accept="image/*" />
        </label>
      </div>
    </div>

    <div class="mt-12 pt-8 border-t border-primary-50 dark:border-primary-900/20 flex justify-end gap-4">
      <button type="button" routerLink="/student/list" class="px-8 py-4 rounded-2xl border border-primary-200 dark:border-primary-800 text-primary-700 dark:text-primary-300 font-bold hover:bg-primary-50 dark:hover:bg-primary-900/30 transition-all">
        إلغاء
      </button>
      <button type="submit" [disabled]="studentForm.invalid" class="text-white bg-primary-600 hover:bg-primary-700 focus:ring-4 focus:outline-none focus:ring-primary-600/20 font-bold rounded-2xl text-base px-12 py-4 text-center disabled:bg-primary-200 dark:disabled:bg-primary-900/50 disabled:text-primary-400 disabled:cursor-not-allowed transition-all shadow-xl shadow-primary-600/20 hover:shadow-primary-600/40">
        حفظ بيانات الطالب
      </button>
    </div>
  </form>
</div>
